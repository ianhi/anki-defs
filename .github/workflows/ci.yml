name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Typecheck, lint, and format check
        run: npm run check

      - name: Run vitest tests
        run: npm test

  python-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: python-server
        run: uv sync --group dev

      - name: Lint and typecheck
        working-directory: python-server
        run: uv run ruff check . && uv run pyright

      - name: Run pytest
        working-directory: python-server
        run: uv run pytest tests/ -v --ignore=tests/test_api_comparison.py
